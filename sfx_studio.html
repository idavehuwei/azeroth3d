<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>熔火之心 · SFX Studio（V1-A5）</title>
<style>
  :root{--bg:#120e0a;--panel:#1c1510;--line:#5a3a22;--gold:#e8b34a;--text:#f3e2c8;--muted:#a89070;}
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.45 "Noto Sans SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);}
  h1{margin:0;font-size:20px;letter-spacing:2px;color:var(--gold)}
  header{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;gap:16px;align-items:baseline;flex-wrap:wrap}
  header p{margin:0;color:var(--muted);font-size:12px}
  .wrap{display:grid;grid-template-columns:240px 1fr 320px;gap:12px;padding:12px;min-height:calc(100vh - 70px)}
  @media(max-width:960px){.wrap{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:10px;overflow:auto}
  .panel h2{margin:0 0 8px;font-size:13px;color:var(--gold);letter-spacing:1px}
  #list{display:flex;flex-direction:column;gap:4px;max-height:70vh}
  #list button{text-align:left;background:#2a1c14;border:1px solid #4a3020;color:var(--text);padding:6px 8px;border-radius:4px;cursor:pointer}
  #list button:hover,#list button.active{border-color:var(--gold);background:#3a2818}
  textarea{width:100%;min-height:280px;background:#0c0907;color:#d8c8a8;border:1px solid var(--line);border-radius:4px;padding:8px;font:12px/1.4 ui-monospace,Menlo,monospace}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
  .row button,.row label{background:#3a2414;border:1px solid var(--line);color:var(--text);padding:6px 10px;border-radius:4px;cursor:pointer}
  .row button:hover{border-color:var(--gold)}
  .buses label{display:flex;align-items:center;gap:6px;margin:6px 0;font-size:12px;color:var(--muted)}
  .buses input[type=range]{flex:1}
  .feet{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .feet button{padding:10px 6px}
  #status{font-size:12px;color:var(--muted);min-height:1.2em}
</style>
</head>
<body>
<header>
  <h1>SFX Studio</h1>
  <p>零音频文件 · 改参数 → 应用试听 → 导出贴回 sfx.js · 不进主游戏包</p>
</header>
<div class="wrap">
  <section class="panel">
    <h2>音色表（<span id="count">0</span>）</h2>
    <div id="list"></div>
  </section>
  <section class="panel">
    <h2>当前条 · <span id="curName">—</span></h2>
    <textarea id="editor" spellcheck="false"></textarea>
    <div class="row">
      <button id="btnApply">应用并试听</button>
      <button id="btnPlay">再听一次</button>
      <button id="btnExport">导出当前条</button>
    </div>
    <div id="status"></div>
  </section>
  <section class="panel">
    <h2>分轨音量</h2>
    <div class="buses">
      <label>音效 <input type="range" id="volSfx" min="0" max="100" value="100"></label>
      <label>音乐 <input type="range" id="volMusic" min="0" max="100" value="50"></label>
      <label>氛围 <input type="range" id="volAmb" min="0" max="100" value="100"></label>
    </div>
    <h2 style="margin-top:16px">脚步表面</h2>
    <div class="feet" id="feet"></div>
    <h2 style="margin-top:16px">氛围 / 音乐试听</h2>
    <div class="row">
      <button data-amb="rain">雨</button>
      <button data-amb="wind">风</button>
      <button data-amb="cave_drip">洞滴</button>
      <button data-amb="dust">沙尘</button>
      <button data-amb="">停氛围</button>
    </div>
    <div class="row">
      <button data-mus="world">莫高雷</button>
      <button data-mus="barrens">贫瘠</button>
      <button data-mus="wailing">哀嚎</button>
      <button data-mus="onyxia">奥妮</button>
      <button data-mus="raid">熔火</button>
    </div>
  </section>
</div>
<script>
/* 最小 BAL 桩，供 sfx.js 读音量 */
window.BAL={sfx:{enabled:true,ambience:true,footVol:1,uiVol:1,ambienceVol:1,footThrottleMs:40,hitCap:8,hitVariance:true}};
function $(s){return document.querySelector(s);}
</script>
<script src="sfx.js"></script>
<script>
(function(){
  let cur=null;
  const list=$("#list"), editor=$("#editor"), status=$("#status");
  function ensure(){SFX.init(); if(SFX._ctx||true) return;}
  function setStatus(t){status.textContent=t||"";}
  function select(name){
    cur=name;
    $("#curName").textContent=name;
    [...list.querySelectorAll("button")].forEach(b=>b.classList.toggle("active",b.dataset.name===name));
    const p=SFX._SOUNDS[name];
    editor.value=JSON.stringify(p,null,2);
    SFX.init(); SFX.play(name);
  }
  const keys=SFX.list();
  $("#count").textContent=keys.length;
  keys.forEach(name=>{
    const b=document.createElement("button");
    b.textContent=name+(SFX._SOUNDS[name].alias?" → "+SFX._SOUNDS[name].alias:"");
    b.dataset.name=name;
    b.onclick=()=>select(name);
    list.appendChild(b);
  });
  $("#btnApply").onclick=()=>{
    if(!cur)return;
    try{
      const obj=JSON.parse(editor.value);
      SFX._SOUNDS[cur]=obj;
      SFX.init(); SFX.play(cur);
      setStatus("已应用 · "+cur);
    }catch(e){setStatus("JSON 无效："+e.message);}
  };
  $("#btnPlay").onclick=()=>{if(cur){SFX.init();SFX.play(cur);}};
  $("#btnExport").onclick=async()=>{
    if(!cur)return;
    const snippet="  "+cur+" :"+editor.value.trim().replace(/\n/g,"\n  ")+",";
    try{
      await navigator.clipboard.writeText(snippet);
      setStatus("已复制到剪贴板");
    }catch(e){
      editor.select(); setStatus("复制失败，请手动全选复制");
    }
  };
  ["grass","dirt","stone","wood","ash","grass_wet"].forEach(s=>{
    const b=document.createElement("button");
    b.textContent=s;
    b.onclick=()=>{SFX.init();SFX.playFoot(s);};
    $("#feet").appendChild(b);
  });
  document.querySelectorAll("[data-amb]").forEach(b=>{
    b.onclick=()=>{SFX.init();SFX.ambience(b.dataset.amb||null);};
  });
  document.querySelectorAll("[data-mus]").forEach(b=>{
    b.onclick=()=>{SFX.init();SFX.music(b.dataset.mus);};
  });
  function bindBus(id,bus){
    $(id).oninput=e=>SFX.setBusVol(bus,(+e.target.value)/100);
  }
  bindBus("#volSfx","sfx"); bindBus("#volMusic","music"); bindBus("#volAmb","ambience");
  if(keys.length)select(keys[0]);
})();
</script>
</body>
</html>
